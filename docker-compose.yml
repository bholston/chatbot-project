services:
  chroma:
    image: chromadb/chroma
    volumes:
      - chroma-data:/data
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      - CHROMA_URL=http://chroma:8000
    env_file:
      - .env.local
    depends_on:
      chroma:
        condition: service_healthy
    restart: unless-stopped

volumes:
  chroma-data:
